<div class="app">

  <!-- Nav Bar -->
  <app-nav-bar (navButtonClicked)="selectPage($event)"></app-nav-bar>

  <!-- Pages -->
  <app-login-page *ngIf="page === 'login'"></app-login-page>

  <app-history-page *ngIf="page === 'history'"></app-history-page>
  <app-chat-page *ngIf="page === 'chat'"></app-chat-page>
</div>
